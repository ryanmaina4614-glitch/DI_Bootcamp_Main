<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drum Kit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🥁 Drum Kit</h1>

<div class="drum-container">
  <button class="drum" data-key="a">A</button>
  <button class="drum" data-key="s">S</button>
  <button class="drum" data-key="d">D</button>
  <button class="drum" data-key="f">F</button>
  <button class="drum" data-key="g">G</button>
  <button class="drum" data-key="h">H</button>
  <button class="drum" data-key="j">J</button>
</div>

<!-- Audio elements -->
<audio id="a" src="sounds/kick.wav"></audio>
<audio id="s" src="sounds/snare.wav"></audio>
<audio id="d" src="sounds/hihat.wav"></audio>
<audio id="f" src="sounds/tom.wav"></audio>
<audio id="g" src="sounds/clap.wav"></audio>
<audio id="h" src="sounds/ride.wav"></audio>
<audio id="j" src="sounds/crash.wav"></audio>

<script src="script.js"></script>
</body>
</html>
