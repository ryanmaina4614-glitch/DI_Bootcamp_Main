
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Star Wars App</title>

  <!-- Font Awesome for spinner -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      color: white;
      background: url("https://www.transparenttextures.com/patterns/stardust.png"), black;
    }

    h1 {
      font-size: 60px;
      color: #ffd700;
      margin-top: 30px;
    }

    #card {
      width: 400px;
      margin: 40px auto;
      padding: 20px;
      border: 3px solid yellow;
      border-radius: 15px;
    }

    button {
      padding: 10px 20px;
      border-radius: 10px;
      border: 2px solid yellow;
      background: white;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: yellow;
    }
  </style>
</head>
<body>

  <h1>STAR WARS</h1>

  <div id="card">
    <div id="content">
      <p>Click the button to find a character</p>
    </div>
  </div>

  <button id="btn">Find Someone</button>

  <script>
    const btn = document.getElementById("btn");
    const content = document.getElementById("content");

    function showLoading() {
      content.innerHTML = `
        <p><i class="fa-solid fa-spinner fa-spin"></i></p>
        <p>Loading...</p>
      `;
    }

    function showError() {
      content.innerHTML = `
        <p>Oh No! That person isn't available.</p>
      `;
    }

    function getRandomId() {
      return Math.floor(Math.random() * 83) + 1;
    }

    function displayCharacter(char, homeworld) {
      content.innerHTML = `
        <h2>${char.name}</h2>
        <p><strong>Height:</strong> ${char.height}</p>
        <p><strong>Gender:</strong> ${char.gender}</p>
        <p><strong>Birth Year:</strong> ${char.birth_year}</p>
        <p><strong>Home World:</strong> ${homeworld}</p>
      `;
    }

    async function fetchCharacter() {
      try {
        showLoading();
        btn.disabled = true;

        const id = getRandomId();

        const response = await fetch(`https://www.swapi.tech/api/people/${id}`);
        if (!response.ok) throw new Error("Failed");

        const data = await response.json();
        const character = data.result.properties;

        const homeworldRes = await fetch(character.homeworld);
        const homeworldData = await homeworldRes.json();

        displayCharacter(character, homeworldData.result.properties.name);

      } catch (error) {
        showError();
      } finally {
        btn.disabled = false;
      }
    }

    btn.addEventListener("click", fetchCharacter);
  </script>

</body>
</html>
