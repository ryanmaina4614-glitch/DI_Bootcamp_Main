<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pokedex</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>Pokédex</h1>

  <div class="pokedex">
    <img id="pokemon-img" src="" alt="pokemon">

    <div class="info">
      <h2 id="name">Name</h2>
      <p id="id">ID:</p>
      <p id="height">Height:</p>
      <p id="weight">Weight:</p>
      <p id="type">Type:</p>
    </div>

    <div class="buttons">
      <button id="prev">⬅️</button>
      <button id="random">🎲</button>
      <button id="next">➡️</button>
    </div>

    <p id="message"></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
