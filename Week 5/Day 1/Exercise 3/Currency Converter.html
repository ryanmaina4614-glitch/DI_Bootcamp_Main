
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Currency Converter</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
    }

    .converter {
      width: 320px;
      margin: 50px auto;
      padding: 20px;
      border-radius: 10px;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1 {
      margin-bottom: 20px;
    }

    input, select, button {
      margin: 10px;
      padding: 10px;
      width: 80%;
      font-size: 16px;
    }

    .selectors {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #switch {
      width: 50px;
      cursor: pointer;
    }

    button {
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    #message {
      color: red;
    }
  </style>
</head>

<body>

  <div class="converter">
    <h1>Currency Converter</h1>

    <input type="number" id="amount" placeholder="Enter amount">

    <div class="selectors">
      <select id="from"></select>

      <button id="switch">🔄</button>

      <select id="to"></select>
    </div>

    <button id="convert">Convert</button>

    <h2 id="result"></h2>
    <p id="message"></p>
  </div>

  <script>
    const fromSelect = document.getElementById("from");
    const toSelect = document.getElementById("to");
    const amountInput = document.getElementById("amount");
    const result = document.getElementById("result");
    const message = document.getElementById("message");

    const convertBtn = document.getElementById("convert");
    const switchBtn = document.getElementById("switch");

    const API_KEY = "c589e96dc4f997ae4d18012d"; //  PUT YOUR API KEY HERE

    //  Load currencies
    async function loadCurrencies() {
      try {
        message.textContent = "Loading currencies...";

        const res = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/codes`);
        const data = await res.json();

        data.supported_codes.forEach(currency => {
          const option1 = document.createElement("option");
          const option2 = document.createElement("option");

          option1.value = option2.value = currency[0];
          option1.textContent = option2.textContent = `${currency[0]} - ${currency[1]}`;

          fromSelect.appendChild(option1);
          toSelect.appendChild(option2);
        });

        message.textContent = "";

      } catch (error) {
        message.textContent = "Error loading currencies.";
      }
    }

    //  Convert currency
    async function convertCurrency() {
      const from = fromSelect.value;
      const to = toSelect.value;
      const amount = amountInput.value;

      if (!amount) {
        message.textContent = "Please enter an amount.";
        return;
      }

      try {
        message.textContent = "Converting...";

        const res = await fetch(
          `https://v6.exchangerate-api.com/v6/${API_KEY}/pair/${from}/${to}/${amount}`
        );

        const data = await res.json();

        result.textContent = `${amount} ${from} = ${data.conversion_result} ${to}`;
        message.textContent = "";

      } catch (error) {
        message.textContent = "Conversion failed.";
      }
    }

    // Switch currencies
    switchBtn.addEventListener("click", () => {
      const temp = fromSelect.value;
      fromSelect.value = toSelect.value;
      toSelect.value = temp;

      convertCurrency();
    });

    //  Convert button
    convertBtn.addEventListener("click", convertCurrency);

    //  Init
    loadCurrencies();
  </script>

</body>
</html>
