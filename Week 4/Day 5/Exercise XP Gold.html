<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Giphy + Async Exercises</title>
</head>
<body>

  <h2>🌟 Exercise 1: Giphy API</h2>
  <button id="getGif">Get Random GIF</button>
  <div id="gifContainer"></div>

  <script>
    // 🌟 Exercise 1 : Fetch Giphy GIF

    const API_KEY = "YOUR_API_KEY_HERE"; // replace with your key

    document.getElementById("getGif").onclick = async () => {
      try {
        const response = await fetch(`https://api.giphy.com/v1/gifs/random?api_key=${API_KEY}`);

        // Check response status
        if (!response.ok) {
          throw new Error("Failed to fetch GIF");
        }

        const data = await response.json();

        // Get GIF URL
        const gifUrl = data.data.images.original.url;

        // Append to DOM
        document.getElementById("gifContainer").innerHTML = `
          <img src="${gifUrl}" width="300">
        `;

      } catch (error) {
        console.log("Error:", error);
      }
    };


    // 🌟 Exercise 2 : Analyze #2 (SEQUENTIAL)

    let resolveAfter2Seconds = function () {
      console.log("starting slow promise");
      return new Promise(resolve => {
        setTimeout(function () {
          resolve("slow");
          console.log("slow promise is done");
        }, 2000);
      });
    };

    let resolveAfter1Second = function () {
      console.log("starting fast promise");
      return new Promise(resolve => {
        setTimeout(function () {
          resolve("fast");
          console.log("fast promise is done");
        }, 1000);
      });
    };

    let sequentialStart = async function () {
      console.log('==SEQUENTIAL START==');
      const slow = await resolveAfter2Seconds();
      console.log(slow);
      const fast = await resolveAfter1Second();
      console.log(fast);
    };

    sequentialStart();

    /*
    Output Order:
    ==SEQUENTIAL START==
    starting slow promise
    (2s delay)
    slow promise is done
    slow
    starting fast promise
    (1s delay)
    fast promise is done
    fast
    */


    // 🌟 Exercise 3 : Analyze #3 (CONCURRENT)

    let concurrentStart = async function () {
      console.log('==CONCURRENT START with await==');
      const slow = resolveAfter2Seconds();
      const fast = resolveAfter1Second();

      console.log(await slow);
      console.log(await fast);
    };

    setTimeout(concurrentStart, 4000);

    /*
    Output Order:
    ==CONCURRENT START with await==
    starting slow promise
    starting fast promise
    (1s) fast promise is done
    (2s) slow promise is done
    slow
    fast
    */


    // 🌟 Exercise 4 : Async/Await + Try/Catch

    const urls = [
      "https://jsonplaceholder.typicode.com/users",
      "https://jsonplaceholder.typicode.com/posts",
      "https://jsonplaceholder.typicode.com/albums"
    ];

    const getData = async function() {
      try {
        const results = await Promise.all(
          urls.map(async (url) => {
            const resp = await fetch(url);
            return await resp.json();
          })
        );

        const [users, posts, albums] = results;

        console.log('users', users);
        console.log('posts', posts);
        console.log('albums', albums);

      } catch (error) {
        console.log('ooooooops');
      }
    };

    getData();
  </script>

</body>
</html>
