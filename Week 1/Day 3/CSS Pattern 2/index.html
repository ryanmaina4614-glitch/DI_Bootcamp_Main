<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="pattern orange-grid"></div>

<style>
.orange-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  width: 300px;
  height: 300px;
  background-color: #853c04; /* Light base */
}

/* Repeating logic using nth-child to create diagonal steps */
.orange-grid::before {
  content: '';
  display: contents;
}

/* Simplified for demonstration: we use a repeating linear gradient 
   to simulate the tiled diagonal more efficiently */
.orange-grid {
  background: 
    conic-gradient(from 90deg at 1px 1px, #fff 90deg, transparent 0) 0 0 / 25px 25px,
    linear-gradient(45deg, #d35400 25%, #e67e22 25%, #e67e22 50%, #d35400 50%, #d35400 75%, #e67e22 75%, #e67e22 100%);
  background-size: 25px 25px, 50px 50px;
}
</style>

<div class="stripe-container">
  <div class="gray-grid"></div>
</div>

<style>
.gray-grid {
  display: grid;
  grid-template-columns: repeat(20, 1fr);
  width: 300px;
  height: 300px;
  border: 1px solid #999;
  /* Using a linear gradient to define the 4-step gray repeat */
  background: linear-gradient(to right, 
    #ccc 0% 25%, 
    #999 25% 50%, 
    #666 50% 75%, 
    #333 75% 100%);
  background-size: 80px 100%; /* Adjust size to match the column count */
}
</style>

<div class="gingham"></div>

<style>
.gingham {
  width: 300px;
  height: 200px;
  border: 1px solid #999;
  background-color: white;
  background-image: 
    linear-gradient(90deg, rgba(200, 0, 0, .5) 50%, transparent 50%),
    linear-gradient(rgba(200, 0, 0, .5) 50%, transparent 50%);
  background-size: 40px 40px;
}
</style>
</body>
</html>
